[package]
name = "casars"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Ratatui launcher for casa-rs command-line applications"
repository.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
arboard = "3"
casa-calibration = { path = "../casa-calibration" }
casa-images = { path = "../casa-images" }
casars-imagebrowser-protocol = { path = "../casars-imagebrowser-protocol" }
casa-ms = { path = "../casa-ms" }
casars-tablebrowser-protocol = { path = "../casars-tablebrowser-protocol" }
casa-tables = { path = "../casa-tables" }
casa-types = { path = "../casa-types" }
crossterm = "0.28"
directories = "5"
image = { version = "0.25", default-features = false, features = ["png"] }
ratatui = "0.30"
ratatui-explorer = "0.3.0"
ratatui-graphics.workspace = true
ratatui-image = { version = "10.0.6", default-features = false, features = ["crossterm", "image-defaults"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
toml = "0.8"
libc = "0.2"

[dev-dependencies]
flate2 = "1"
ndarray.workspace = true
tar = "0.4"
tempfile = "3"

[target.'cfg(target_os = "macos")'.dependencies]
plotters = { version = "0.3.7", default-features = false, features = ["bitmap_backend", "line_series", "point_series", "full_palette", "ttf"] }

[target.'cfg(not(target_os = "macos"))'.dependencies]
plotters = { version = "0.3.7", default-features = false, features = ["bitmap_backend", "line_series", "point_series", "full_palette", "ab_glyph"] }

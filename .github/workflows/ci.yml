name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check SPDX license headers
        run: scripts/check-spdx.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Free lint build artifacts
        run: cargo clean

      - name: Install explicit measures runtime for integration tests
        run: |
          mkdir -p "$RUNNER_TEMP/casa-measures"
          tar -xzf crates/casa-measures-data/data/casa-measures-runtime.tar.gz -C "$RUNNER_TEMP/casa-measures"
          cp crates/casa-measures-data/data/casa-measures-runtime.provenance.json "$RUNNER_TEMP/casa-measures/.casa-rs-measures-provenance.json"
          echo "CASA_RS_MEASURESPATH=$RUNNER_TEMP/casa-measures" >> "$GITHUB_ENV"

      - name: Run tests
        env:
          # casars-imager progress instrumentation is process-global and its
          # unit tests intentionally exercise that shared context.
          RUST_TEST_THREADS: 1
        run: cargo test --workspace

  python_package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Test Python package
        run: scripts/test-python-package.sh

  docs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps

      - name: Build MkDocs site
        run: scripts/build-python-docs.sh site

  native_gui:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Set up Python for production notebook UI test
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Check generated frontend bindings
        run: scripts/generate-frontend-bindings.sh --check

      - name: Install explicit measures runtime for GUI integration tests
        run: |
          mkdir -p "$RUNNER_TEMP/casa-measures"
          tar -xzf crates/casa-measures-data/data/casa-measures-runtime.tar.gz -C "$RUNNER_TEMP/casa-measures"
          cp crates/casa-measures-data/data/casa-measures-runtime.provenance.json "$RUNNER_TEMP/casa-measures/.casa-rs-measures-provenance.json"
          echo "CASA_RS_MEASURESPATH=$RUNNER_TEMP/casa-measures" >> "$GITHUB_ENV"

      - name: Run native GUI interaction gate
        run: just gui-test

      - name: Retain GUI test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: casars-mac-ui-tests-${{ github.run_id }}
          path: |
            apps/casars-mac/.gui-test/CasarsMacUITests.xcresult
            apps/casars-mac/.gui-test/gui-test.evidence.json
          if-no-files-found: warn

  smoke:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Run smoke gate
        run: scripts/test-smoke.sh

  suite_install:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Test suite installer
        run: scripts/test-install-suite.sh

  coverage:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM coverage tools
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage (line)
        run: scripts/run-coverage.sh --ci-like

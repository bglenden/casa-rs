name: Deploy rustdoc to GitHub Pages

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps

      - name: Build MkDocs site
        run: scripts/build-python-docs.sh site

      - name: Stage rustdoc into published site
        run: |
          mkdir -p site/rustdoc
          {
            cat <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>casa-rs Rust API docs</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 72rem; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
              code { background: #f4f4f4; padding: 0.1rem 0.25rem; border-radius: 0.2rem; }
              li { margin: 0.25rem 0; }
            </style>
          </head>
          <body>
            <h1>casa-rs Rust API docs</h1>
            <p>Workspace crate documentation generated by <code>cargo doc --workspace --no-deps</code>.</p>
            <ul>
          HTML
            for index in target/doc/*/index.html; do
              crate="$(basename "$(dirname "$index")")"
              case "$crate" in
                src) continue ;;
              esac
              label="${crate//_/-}"
              printf '              <li><a href="%s/index.html">%s</a></li>\n' "$crate" "$label"
            done | sort
            cat <<'HTML'
            </ul>
          </body>
          </html>
          HTML
          } > target/doc/index.html
          rsync -a target/doc/ site/rustdoc/

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          publish_dir="$(mktemp -d)"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$repo_url" "$publish_dir"
          else
            git clone --depth 1 "$repo_url" "$publish_dir"
            git -C "$publish_dir" checkout --orphan gh-pages
            git -C "$publish_dir" rm -rf . >/dev/null 2>&1 || true
          fi

          rsync -a --delete --exclude '.git/' site/ "$publish_dir"/
          touch "$publish_dir/.nojekyll"

          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_dir" add --all

          if git -C "$publish_dir" diff --cached --quiet; then
            echo "No docs changes to publish"
            exit 0
          fi

          git -C "$publish_dir" commit -m "Deploy rustdoc for ${GITHUB_SHA}"
          git -C "$publish_dir" push origin HEAD:gh-pages

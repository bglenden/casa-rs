name: CI

on:
  push:
  pull_request:

jobs:
  lint_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check SPDX license headers
        run: |
          bad=$(find crates -name '*.rs' -print0 \
              | xargs -0 grep -rL 'SPDX-License-Identifier' || true)
          if [ -n "$bad" ]; then
            echo "::error::Files missing SPDX-License-Identifier header:"
            echo "$bad"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run demo examples
        run: |
          cargo run -p casacore-aipsio --example t_aipsio
          cargo run -p casacore-tables --example t_table

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run coverage (line)
        run: cargo tarpaulin --workspace --timeout 120 --out Stdout --fail-under 75

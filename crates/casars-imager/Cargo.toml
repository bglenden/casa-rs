[package]
name = "casars-imager"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "MeasurementSet-backed CASA-compatible imaging application"
repository.workspace = true
publish = false

[features]
default = []
slow-tests = []

[lints]
workspace = true

[dependencies]
casa-provider-contracts = { path = "../casa-provider-contracts" }
casa-coordinates = { path = "../casa-coordinates" }
casa-images = { path = "../casa-images" }
casa-imaging = { path = "../casa-imaging" }
casa-ms = { path = "../casa-ms" }
casa-tables = { path = "../casa-tables" }
casa-types = { path = "../casa-types" }
flate2 = "1"
image = { version = "0.25", default-features = false, features = ["png"] }
ndarray.workspace = true
num-complex.workspace = true
schemars = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror.workspace = true

[dev-dependencies]
casa-test-support = { path = "../casa-test-support" }
tempfile = "3"

[[bin]]
name = "casars-imager"
path = "src/main.rs"

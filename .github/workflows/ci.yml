name: CI

on:
  pull_request:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  assistant:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/casars-assistant/package-lock.json

      - name: Install pinned assistant adapter dependencies
        run: npm --prefix apps/casars-assistant ci --ignore-scripts

      - name: Test the provider-neutral assistant protocol
        run: npm --prefix apps/casars-assistant test

  lint_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check SPDX license headers
        run: scripts/check-spdx.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Free lint build artifacts
        run: cargo clean

      - name: Run tests
        run: cargo test --workspace

  python_package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Test Python package
        run: scripts/test-python-package.sh

  native_gui:
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/casars-assistant/package-lock.json

      - name: Install pinned assistant adapter dependencies
        run: npm --prefix apps/casars-assistant ci --ignore-scripts

      - name: Set up Python for production notebook UI test
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Expose Python to the UI test process
        run: echo "CASA_RS_GUI_TEST_PYTHON=$(command -v python3)" >> "$GITHUB_ENV"

      - name: Run native GUI interaction gate
        run: just gui-test

      - name: Retain GUI test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: casars-mac-ui-tests-${{ github.run_id }}
          path: apps/casars-mac/.gui-test/CasarsMacUITests.xcresult
          if-no-files-found: warn

  smoke:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Run smoke gate
        run: scripts/test-smoke.sh

  suite_install:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Test suite installer
        run: scripts/test-install-suite.sh

  coverage:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM coverage tools
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage (line)
        run: scripts/run-coverage.sh --ci-like

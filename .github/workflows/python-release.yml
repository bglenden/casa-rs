name: Python Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build release assets (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: release-assets-linux-x86_64
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            smoke_wheel_glob: dist/*cp312*.whl
          - os: macos-14
            artifact_name: release-assets-macos-arm64
            platform: macos-arm64
            target: aarch64-apple-darwin
            manylinux: off
            smoke_wheel_glob: dist/*cp312*.whl

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up smoke-test Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          rust-toolchain: stable
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --manifest-path crates/casars-python/Cargo.toml --interpreter 3.10 3.11 3.12 --out dist

      - name: Build suite binaries
        run: |
          cargo build -q --release -p casars --bin casars --bin casars-casa-task
          cargo build -q --release -p casa-calibration --bin calibrate
          cargo build -q --release -p casars-importvla --bin casars-importvla
          cargo build -q --release -p casa-ms --bin msexplore --bin mstransform
          cargo build -q --release -p casars-imager --bin casars-imager
          cargo build -q --release -p casa-images --bin imexplore --bin immoments --bin impv --bin imsubimage --bin immath --bin imregrid --bin feather --bin exportfits --bin importfits

      - name: Smoke-test built wheel
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=( ${{ matrix.smoke_wheel_glob }} )
          if [[ ${#wheels[@]} -ne 1 ]]; then
            echo "expected exactly one cp312 wheel, found ${#wheels[@]}" >&2
            printf '%s\n' "${wheels[@]}" >&2
            exit 1
          fi

          python -m pip install --upgrade pip
          python -m pip install "${wheels[0]}"
          CASARS_CALIBRATE_BIN="$GITHUB_WORKSPACE/target/release/calibrate" \
          CASARS_IMPORTVLA_BIN="$GITHUB_WORKSPACE/target/release/casars-importvla" \
          CASARS_MSEXPLORE_BIN="$GITHUB_WORKSPACE/target/release/msexplore" \
          CASARS_IMAGER_BIN="$GITHUB_WORKSPACE/target/release/casars-imager" \
          CASARS_IMMOMENTS_BIN="$GITHUB_WORKSPACE/target/release/immoments" \
          CASARS_EXPORTFITS_BIN="$GITHUB_WORKSPACE/target/release/exportfits" \
          CASARS_IMPORTFITS_BIN="$GITHUB_WORKSPACE/target/release/importfits" \
          python - <<'PY'
          import casars
          from casars.tasks import calibrate, image_analysis, imager, importvla, msexplore

          assert casars.__version__
          info = calibrate.protocol_info()
          assert info.protocol_name == "casa_calibration_task"
          assert info.protocol_version == 1
          assert importvla.protocol_info().protocol_name == "casa_importvla_task"
          assert msexplore.protocol_info().protocol_name == "casa_msexplore_task"
          assert imager.protocol_info().protocol_name == "casa_imager_task"
          assert image_analysis.immoments_protocol_info().protocol_name == "casa_image_analysis_task"
          assert image_analysis.exportfits_protocol_info().protocol_name == "casa_image_analysis_task"
          assert image_analysis.importfits_protocol_info().protocol_name == "casa_image_analysis_task"
          schema = calibrate.schema()
          assert "request_schema" in schema
          assert "result_schema" in schema
          calibrate.validate_signature_parity()
          PY

      - name: Package suite and standalone binary bundles
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          scripts/package-suite-bundle.sh \
            --version "$version" \
            --platform "${{ matrix.platform }}" \
            --bin-dir target/release \
            --wheel-dir dist \
            --out-dir dist

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          rust-toolchain: stable
          args: --manifest-path crates/casars-python/Cargo.toml --out dist

      - name: Build task binaries for smoke test
        run: |
          cargo build -q -p casars --bin casars-casa-task
          cargo build -q -p casa-calibration --bin calibrate
          cargo build -q -p casars-importvla --bin casars-importvla
          cargo build -q -p casa-ms --bin msexplore
          cargo build -q -p casars-imager --bin casars-imager
          cargo build -q -p casa-images --bin immoments --bin exportfits --bin importfits

      - name: Smoke-test built sdist
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          sdists=( dist/*.tar.gz )
          if [[ ${#sdists[@]} -ne 1 ]]; then
            echo "expected exactly one sdist, found ${#sdists[@]}" >&2
            printf '%s\n' "${sdists[@]}" >&2
            exit 1
          fi

          python -m pip install --upgrade pip
          python -m pip install "${sdists[0]}"
          CASARS_CALIBRATE_BIN="$GITHUB_WORKSPACE/target/debug/calibrate" \
          CASARS_IMPORTVLA_BIN="$GITHUB_WORKSPACE/target/debug/casars-importvla" \
          CASARS_MSEXPLORE_BIN="$GITHUB_WORKSPACE/target/debug/msexplore" \
          CASARS_IMAGER_BIN="$GITHUB_WORKSPACE/target/debug/casars-imager" \
          CASARS_IMMOMENTS_BIN="$GITHUB_WORKSPACE/target/debug/immoments" \
          CASARS_EXPORTFITS_BIN="$GITHUB_WORKSPACE/target/debug/exportfits" \
          CASARS_IMPORTFITS_BIN="$GITHUB_WORKSPACE/target/debug/importfits" \
          python - <<'PY'
          import casars
          from casars.tasks import calibrate, image_analysis, imager, importvla, msexplore

          assert casars.__version__
          info = calibrate.protocol_info()
          assert info.protocol_name == "casa_calibration_task"
          assert info.protocol_version == 1
          assert importvla.protocol_info().protocol_name == "casa_importvla_task"
          assert msexplore.protocol_info().protocol_name == "casa_msexplore_task"
          assert imager.protocol_info().protocol_name == "casa_imager_task"
          assert image_analysis.immoments_protocol_info().protocol_name == "casa_image_analysis_task"
          assert image_analysis.exportfits_protocol_info().protocol_name == "casa_image_analysis_task"
          assert image_analysis.importfits_protocol_info().protocol_name == "casa_image_analysis_task"
          calibrate.validate_signature_parity()
          PY

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          pattern: python-sdist
          path: python-dist
          merge-multiple: true

      - name: Add installer script asset
        run: |
          cp scripts/install-suite.sh release-dist/install-casa-rs.sh
          cp python-dist/* release-dist/

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Set up Python for PyPI upload
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Publish to PyPI
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "${MATURIN_PYPI_TOKEN:-}" ]]; then
            echo "PYPI_API_TOKEN is not configured; GitHub release assets were published only."
            exit 0
          fi

          python -m pip install --upgrade pip
          python -m pip install 'maturin>=1.7,<2'
          maturin upload --non-interactive python-dist/*

      - name: Skip PyPI upload for prerelease tags
        if: ${{ contains(github.ref_name, '-') }}
        run: echo "Prerelease tag detected; GitHub release assets were published but PyPI upload was intentionally skipped."
